<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HelloFresh ➡️ Paprika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        body { background-color: #f3f4f6; }
    </style>
</head>
<body class="text-gray-800 p-4 font-sans max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-center mb-6">🍋 HelloFresh ➡️ Paprika (v18)</h1>
    
    <div class="bg-white p-5 rounded-2xl shadow-sm mb-5 border border-gray-100">
        <label class="block text-sm font-bold mb-2">🔑 Google Gemini API Key</label>
        <input type="password" id="apiKey" class="w-full p-3 border rounded-xl bg-gray-50">
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm mb-5 border border-gray-100">
        <label class="block font-bold mb-2">1️⃣ Vorderseite</label>
        <input type="file" id="frontImage" accept="image/*" class="w-full">
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-gray-100">
        <label class="block font-bold mb-2">2️⃣ Rückseite</label>
        <input type="file" id="backImage" accept="image/*" class="w-full">
    </div>

    <button id="generateBtn" class="w-full bg-green-500 text-white font-bold py-4 rounded-2xl transition-all">Rezept generieren</button>
    <button id="downloadBtn" class="hidden w-full bg-blue-500 text-white font-bold py-4 rounded-2xl mt-3 transition-all">Datei in Paprika öffnen</button>
    <div id="status" class="mt-5 p-4 text-center text-sm font-medium rounded-xl hidden bg-white shadow-sm border border-gray-100"></div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusDiv = document.getElementById('status'); // <-- Das hat im letzten Code gefehlt!

        apiKeyInput.value = localStorage.getItem('geminiApiKey') || '';
        apiKeyInput.addEventListener('change', () => localStorage.setItem('geminiApiKey', apiKeyInput.value));

        const getResizedBase64 = (file) => new Promise((resolve, reject) => {
            if (!file) {
                reject(new Error("Bitte wähle zuerst ein Bild aus."));
                return;
            }
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 1200;
                    let w = img.width, h = img.height;
                    if(w > MAX) { h = Math.round(h * (MAX/w)); w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });

        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return alert('API Key fehlt!');
            
            generateBtn.disabled = true;
            generateBtn.classList.add('opacity-50');
            statusDiv.classList.remove('hidden');
            statusDiv.className = 'mt-5 p-4 text-center text-sm font-medium rounded-xl bg-blue-50 text-blue-700 border border-blue-100';
            statusDiv.textContent = '🧠 Analysiere Bilder... Bitte warten...';

            try {
                const frontBase64 = await getResizedBase64(document.getElementById('frontImage').files[0]);
                const backBase64 = await getResizedBase64(document.getElementById('backImage').files[0]);

                const prompt = `Du bist ein strenger Rezept-Extraktor.
                Regeln:
                1. Name: Gerichtname ohne "HelloFresh" oder Marken.
                2. Zutaten: NUR exakt die Spalte "2P" und "Basiszutaten aus Deiner Küche" abtippen. NICHTS erfinden.
                3. Directions: Jeden Arbeitsschritt mit ZWEI Zeilenumbrüchen (\\n\\n) trennen. Zutaten im Text **fett** machen.
                4. Prep_time: Zeit von der Vorderseite auslesen (z.B. "25 - 35 Min").
                
                Gib AUSSCHLIESSLICH das validierte JSON zurück (ohne Markdown Block):
                {"name":"...","ingredients":"...","directions":"...","prep_time":"...","servings":"2","source":"HelloFresh"}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: prompt}, {inlineData:{mimeType:"image/jpeg", data:frontBase64}}, {inlineData:{mimeType:"image/jpeg", data:backBase64}}]}]
                    })
                });

                const data = await response.json();
                
                if (!response.ok || data.error) {
                    throw new Error(data.error?.message || "API Fehler");
                }

                const jsonText = data.candidates[0].content.parts[0].text;
                const recipeData = JSON.parse(jsonText.replace(/```json|```/g, '').trim());
                recipeData.photo_data = frontBase64;
                recipeData.uid = crypto.randomUUID ? crypto.randomUUID().toUpperCase() : '1234-5678-9012'.toUpperCase();

                const gzipped = pako.gzip(JSON.stringify(recipeData));
                const blob = new Blob([gzipped], {type: "application/octet-stream"});
                const url = URL.createObjectURL(blob);
                
                generateBtn.classList.add('hidden');
                downloadBtn.classList.remove('hidden');
                downloadBtn.onclick = () => {
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = (recipeData.name || "Rezept").replace(/[^a-z0-9]/gi, '_') + ".paprikarecipe";
                    a.click();
                };
                
                statusDiv.className = 'mt-5 p-4 text-center text-sm font-bold rounded-xl bg-green-50 text-green-700 border border-green-200';
                statusDiv.textContent = '✅ Fertig! Klicke auf "Datei in Paprika öffnen".';
                
            } catch (err) {
                statusDiv.className = 'mt-5 p-4 text-center text-sm font-bold rounded-xl bg-red-50 text-red-700 border border-red-200';
                statusDiv.textContent = '❌ Fehler: ' + err.message;
                generateBtn.disabled = false;
                generateBtn.classList.remove('opacity-50');
            }
        });
    </script>
</body>
</html>
