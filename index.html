<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HelloFresh ➡️ Paprika</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>
    <!-- Pako (GZIP) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f3f4f6; }
        .cropper-container { width: 100% !important; max-height: 400px; }
        img { display: block; max-width: 100%; }
        .success-bg { background-color: #ecfdf5; border-color: #34d399; color: #065f46; }
    </style>
</head>
<body class="text-gray-800 p-4 font-sans antialiased max-w-lg mx-auto">
    
    <div class="text-center mb-6">
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">🍋 HelloFresh</h1>
        <p class="text-sm font-medium text-gray-500 mt-1">Export zu Paprika 3 (v8 - Share UI)</p>
    </div>
    
    <div class="bg-white p-5 rounded-2xl shadow-sm mb-5 border border-gray-100">
        <label class="block text-sm font-bold text-gray-700 mb-2">🔑 Google Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-400 outline-none transition-all">
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm mb-5 border border-gray-100">
        <label class="block text-sm font-bold text-gray-700 mb-2">1️⃣ Vorderseite (Foto, Titel & Zeit)</label>
        <input type="file" id="frontImage" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 mb-3 cursor-pointer">
        
        <div id="cropperWrapper" class="hidden mt-3 border border-gray-200 rounded-xl overflow-hidden bg-gray-50">
            <img id="imageToCrop" src="">
            <div class="p-2 text-xs text-center text-gray-500 bg-white">Ziehe das Rechteck um das Gericht.</div>
        </div>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-gray-100">
        <label class="block text-sm font-bold text-gray-700 mb-2">2️⃣ Rückseite (Zutaten & Text)</label>
        <input type="file" id="backImage" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer">
    </div>

    <div id="buttonContainer">
        <!-- Generieren Button -->
        <button id="generateBtn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-green-200 transition-all active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
            Rezept generieren
        </button>

        <!-- Teilen Button (iOS Share Sheet) - Standardmäßig versteckt -->
        <button id="shareBtn" class="hidden w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-95 flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8.684 13.342C8.886 12.938 9 12.482 9 12c0-.482-.114-.938-.316-1.342m0 2.684a3 3 0 110-2.684m0 2.684l6.632 3.316m-6.632-6l6.632-3.316m0 0a3 3 0 105.367-2.684 3 3 0 00-5.367 2.684zm0 9.316a3 3 0 105.368 2.684 3 3 0 00-5.368-2.684z" /></svg>
            In Paprika öffnen
        </button>

        <!-- Manueller Download als Fallback -->
        <button id="downloadBtn" class="hidden w-full bg-gray-200 hover:bg-gray-300 text-gray-700 font-bold py-3 px-4 rounded-2xl transition-all active:scale-95 flex items-center justify-center gap-2 mt-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
            Datei manuell laden
        </button>
    </div>
    
    <div id="status" class="mt-5 p-4 text-center text-sm font-medium text-gray-600 rounded-xl hidden transition-all"></div>
    
    <script>
        const apiKeyInput = document.getElementById('apiKey');
        apiKeyInput.value = localStorage.getItem('geminiApiKey') || '';
        apiKeyInput.addEventListener('change', () => localStorage.setItem('geminiApiKey', apiKeyInput.value));

        let cropper = null;
        let finalRecipeFile = null;
        let finalFileName = "";

        const frontInput = document.getElementById('frontImage');
        const backInput = document.getElementById('backImage');
        const imageToCrop = document.getElementById('imageToCrop');
        const cropperWrapper = document.getElementById('cropperWrapper');
        
        const generateBtn = document.getElementById('generateBtn');
        const shareBtn = document.getElementById('shareBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusDiv = document.getElementById('status');

        const getResizedBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height = Math.round(height * (MAX_WIDTH / width));
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                };
                img.onerror = error => reject(error);
            };
            reader.onerror = error => reject(error);
        });

        const getCroppedBase64 = () => {
            if (!cropper) return null;
            const canvas = cropper.getCroppedCanvas({ width: 800, height: 800 });
            return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
        };

        const generateUUID = () => {
            if (crypto && crypto.randomUUID) return crypto.randomUUID().toUpperCase();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16).toUpperCase();
            });
        };

        frontInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    imageToCrop.src = event.target.result;
                    cropperWrapper.classList.remove('hidden');
                    if (cropper) cropper.destroy();
                    cropper = new Cropper(imageToCrop, {
                        aspectRatio: 1, viewMode: 1, autoCropArea: 0.8, background: false
                    });
                };
                reader.readAsDataURL(e.target.files[0]);
            }
        });

        // 1. Generieren-Logik
        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return alert('Bitte API Key eingeben.');
            if (!cropper) return alert('Bitte die Vorderseite hochladen.');
            if (!backInput.files || !backInput.files[0]) return alert('Bitte die Rückseite hochladen.');

            generateBtn.disabled = true;
            statusDiv.style.display = 'block';
            statusDiv.className = 'mt-5 p-4 text-center text-sm font-medium text-gray-700 bg-blue-50 border border-blue-100 rounded-xl';
            statusDiv.textContent = '⏳ Scanne Text (Strikter Modus)...';

            try {
                const frontBase64 = getCroppedBase64();
                const backBase64 = await getResizedBase64(backInput.files[0]);

                const prompt = `Du bist ein sturer, hochpräziser Daten-Extraktor. Du hast KEIN eigenes Wissen über Kochen. Deine einzige Aufgabe ist es, exakt den gedruckten Text der HelloFresh-Karten in ein JSON zu übertragen.

ZUTATEN-REGELN (HÖCHSTE PRIORITÄT - ABSOLUTES HALLUZINATIONSVERBOT):
1. Lies AUSSCHLIESSLICH die Zutaten aus der gedruckten Tabelle ("Zutaten", Spalte 2P).
2. Lies AUSSCHLIESSLICH die gedruckten Zutaten aus dem Kasten ("Basiszutaten aus Deiner Küche").
3. Ignoriere das Foto des fertigen Gerichts komplett für die Zutatenliste. Lass dich nicht von Bildern irritieren.
4. ERFINDE NICHTS DAZU. Wenn es nicht als Text in diesen beiden Bereichen gedruckt steht, existiert es nicht.

WEITERE REGELN:
5. Directions: Trenne die einzelnen Arbeitsschritte zwingend mit ZWEI Zeilenumbrüchen (\\n\\n).
6. Directions: JEDES Mal, wenn eine Zutat im Text der Arbeitsschritte namentlich erwähnt wird, formatiere dieses Wort FETT mit zwei Sternchen (z.B. **Öl**, **Salz**).
7. Prep_time: Lese die genaue Zeitangabe von der Vorderseite ab (z.B. "25 - 35 Min") und trage sie ein.

Gib AUSSCHLIESSLICH das validierte JSON zurück, exakt nach diesem Schema:
{
  "name": "Titel des Rezepts inkl. Untertitel",
  "ingredients": "Zutat 1\\nZutat 2\\n...",
  "directions": "1. **Zutat A** vorbereiten...\\n\\n2. In einer Pfanne **Öl** erhitzen...",
  "prep_time": "Zeitangabe",
  "cook_time": "",
  "servings": "2",
  "nutritional_info": "Brennwert, Fett, Kohlenhydrate, etc.",
  "source": "HelloFresh",
  "source_url": "",
  "difficulty": ""
}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: "image/jpeg", data: frontBase64 } },
                            { inlineData: { mimeType: "image/jpeg", data: backBase64 } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                };

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!response.ok || data.error) throw new Error(data.error?.message || "Unbekannter API Fehler");

                const jsonText = data.candidates[0].content.parts[0].text;
                const recipeData = JSON.parse(jsonText);
                
                recipeData.uid = generateUUID();
                recipeData.photo_data = frontBase64; 
                recipeData.photo = recipeData.uid + ".jpg"; 
                recipeData.categories = ["HelloFresh"];
                
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                recipeData.created = now.toISOString().replace('T', ' ').substring(0, 19);

                const jsonString = JSON.stringify(recipeData);
                const gzipped = pako.gzip(jsonString);
                
                finalFileName = (recipeData.name || "Rezept").substring(0, 30).replace(/[^a-zA-Z0-9]/g, '_') + ".paprikarecipe";
                finalRecipeFile = new File([gzipped], finalFileName, { type: "application/octet-stream" });

                // UI anpassen: Generieren verstecken, Teilen-Buttons anzeigen
                generateBtn.classList.add('hidden');
                shareBtn.classList.remove('hidden');
                downloadBtn.classList.remove('hidden');

                statusDiv.className = 'mt-5 p-4 text-center text-sm font-bold success-bg border rounded-xl';
                statusDiv.textContent = '✅ Rezept erstellt! Klicke jetzt auf "In Paprika öffnen".';
                
            } catch (error) {
                console.error(error);
                statusDiv.className = 'mt-5 p-4 text-center text-sm font-bold text-red-700 bg-red-50 border border-red-200 rounded-xl break-words';
                statusDiv.textContent = '❌ Fehler: ' + error.message;
                generateBtn.disabled = false;
            }
        });

        // 2. Teilen-Logik (Sofortige Nutzeraktion umgeht Safari-Blocker)
        shareBtn.addEventListener('click', async () => {
            if (navigator.canShare && navigator.canShare({ files: [finalRecipeFile] })) {
                try {
                    await navigator.share({
                        files: [finalRecipeFile],
                        title: finalFileName,
                        text: 'Rezept in Paprika importieren'
                    });
                } catch (err) {
                    console.log("Teilen abgebrochen oder fehlgeschlagen", err);
                }
            } else {
                alert("Dein Browser unterstützt das direkte Teilen nicht. Nutze den manuellen Download.");
            }
        });

        // 3. Manueller Download-Fallback
        downloadBtn.addEventListener('click', () => {
            const url = URL.createObjectURL(finalRecipeFile);
            const a = document.createElement("a");
            a.href = url;
            a.download = finalFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

    </script>
</body>
</html>
