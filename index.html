<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HelloFresh ➡️ Paprika</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>

    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #f3f4f6; }
        .success-bg { background-color: #ecfdf5; border-color: #34d399; color: #065f46; }
        /* Der abgedunkelte Rand für die Kamera */
        .camera-overlay { box-shadow: 0 0 0 9999px rgba(0, 0, 0, 0.65); }
    </style>
</head>
<body class="text-gray-800 p-4 font-sans antialiased max-w-lg mx-auto">
    
    <div class="text-center mb-6">
        <h1 class="text-3xl font-extrabold text-gray-900 tracking-tight">🍋 HelloFresh</h1>
        <p class="text-sm font-medium text-gray-500 mt-1">Export zu Paprika 3 (v11 - Live Kamera)</p>
    </div>
    
    <div class="bg-white p-5 rounded-2xl shadow-sm mb-5 border border-gray-100">
        <label class="block text-sm font-bold text-gray-700 mb-2">🔑 Google Gemini API Key</label>
        <input type="password" id="apiKey" placeholder="AIzaSy..." class="w-full p-3 border border-gray-200 rounded-xl bg-gray-50 focus:ring-2 focus:ring-green-400 outline-none transition-all">
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm mb-5 border border-gray-100">
        <label class="block text-sm font-bold text-gray-700 mb-3">1️⃣ Vorderseite (Rezeptbild)</label>
        
        <div id="frontActions" class="flex gap-2 mb-2">
            <button id="startCamBtn" class="flex-1 bg-green-100 hover:bg-green-200 text-green-700 font-bold py-3 rounded-xl border border-green-200 flex flex-col items-center justify-center transition-all">
                <span class="text-xl mb-1">📸</span> Live-Kamera
            </button>
            <label class="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl border border-gray-200 flex flex-col items-center justify-center cursor-pointer transition-all">
                <span class="text-xl mb-1">📂</span> Datei wählen
                <input type="file" id="frontImage" accept="image/*" class="hidden">
            </label>
        </div>

        <div id="cameraUI" class="hidden relative rounded-xl overflow-hidden bg-black mb-2 shadow-inner">
            <video id="cameraVideo" autoplay playsinline class="w-full h-auto"></video>
            <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
                <div id="cropSquare" class="w-3/4 aspect-square border-2 border-white rounded-lg camera-overlay"></div>
            </div>
            <button id="captureBtn" class="absolute bottom-4 left-1/2 transform -translate-x-1/2 bg-white text-black font-bold py-3 px-8 rounded-full shadow-xl active:scale-95 transition-all">
                Auslösen
            </button>
        </div>

        <div id="previewWrapper" class="hidden text-center mt-4">
            <img id="imagePreview" src="" class="mx-auto rounded-xl shadow-md border border-gray-200 w-48 h-48 object-cover">
            <button id="retakeBtn" class="mt-3 text-sm text-red-500 font-semibold underline py-2 px-4 rounded-lg hover:bg-red-50 transition-all">Neu aufnehmen</button>
        </div>
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-gray-100">
        <label class="block text-sm font-bold text-gray-700 mb-2">2️⃣ Rückseite (Zutaten & Text)</label>
        <input type="file" id="backImage" accept="image/*" capture="environment" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100 cursor-pointer">
    </div>

    <div id="buttonContainer">
        <button id="generateBtn" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-green-200 transition-all active:scale-95 disabled:opacity-50 flex items-center justify-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 002-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" /></svg>
            Rezept generieren
        </button>

        <button id="downloadBtn" class="hidden w-full bg-blue-500 hover:bg-blue-600 text-white font-bold py-4 px-4 rounded-2xl shadow-lg shadow-blue-200 transition-all active:scale-95 flex items-center justify-center gap-2 mt-3">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
            Datei in Paprika öffnen
        </button>
    </div>
    
    <div id="status" class="mt-5 p-4 text-center text-sm font-medium text-gray-600 rounded-xl hidden transition-all"></div>
    
    <script>
        const apiKeyInput = document.getElementById('apiKey');
        apiKeyInput.value = localStorage.getItem('geminiApiKey') || '';
        apiKeyInput.addEventListener('change', () => localStorage.setItem('geminiApiKey', apiKeyInput.value));

        let frontBase64Global = null;
        let finalRecipeFile = null;
        let finalFileName = "";
        let stream = null; // Für die Kamera

        // Elemente
        const frontActions = document.getElementById('frontActions');
        const startCamBtn = document.getElementById('startCamBtn');
        const cameraUI = document.getElementById('cameraUI');
        const cameraVideo = document.getElementById('cameraVideo');
        const cropSquare = document.getElementById('cropSquare');
        const captureBtn = document.getElementById('captureBtn');
        
        const frontInput = document.getElementById('frontImage');
        const backInput = document.getElementById('backImage');
        const imagePreview = document.getElementById('imagePreview');
        const previewWrapper = document.getElementById('previewWrapper');
        const retakeBtn = document.getElementById('retakeBtn');
        
        const generateBtn = document.getElementById('generateBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const statusDiv = document.getElementById('status');

        // Hilfsfunktionen
        const generateUUID = () => {
            if (crypto && crypto.randomUUID) return crypto.randomUUID().toUpperCase();
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16).toUpperCase();
            });
        };

        const getResizedBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) { height = Math.round(height * (MAX_WIDTH / width)); width = MAX_WIDTH; }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });

        const getAutoCroppedBase64FromFile = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const size = Math.min(img.width, img.height); 
                    const startX = (img.width - size) / 2;
                    const startY = (img.height - size) / 2;
                    const outSize = size > 800 ? 800 : size;
                    canvas.width = outSize; canvas.height = outSize;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, startX, startY, size, size, 0, 0, outSize, outSize);
                    resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });

        // --- KAMERA LOGIK ---
        startCamBtn.addEventListener('click', async () => {
            try {
                // Kamera auf der Rückseite (environment) anfordern
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                cameraVideo.srcObject = stream;
                frontActions.classList.add('hidden');
                cameraUI.classList.remove('hidden');
            } catch (err) {
                alert("Kamera konnte nicht gestartet werden. Bitte nutze den Button 'Datei wählen'.");
            }
        });

        function stopCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
                stream = null;
            }
            cameraUI.classList.add('hidden');
        }

        // Live-Foto zuschneiden und speichern
        captureBtn.addEventListener('click', () => {
            const videoRect = cameraVideo.getBoundingClientRect();
            const squareRect = cropSquare.getBoundingClientRect();
            
            // Berechne das exakte Skalierungsverhältnis zwischen angezeigtem Video und echtem Video
            const scaleX = cameraVideo.videoWidth / videoRect.width;
            const scaleY = cameraVideo.videoHeight / videoRect.height;

            const cropX = (squareRect.left - videoRect.left) * scaleX;
            const cropY = (squareRect.top - videoRect.top) * scaleY;
            const cropW = squareRect.width * scaleX;
            const cropH = squareRect.height * scaleY;

            const canvas = document.createElement('canvas');
            const MAX_SIZE = 800; // Maximale Größe für das Endbild (Speicher schonen)
            canvas.width = MAX_SIZE;
            canvas.height = MAX_SIZE;
            
            const ctx = canvas.getContext('2d');
            // Zeichne exakt den Rahmen aus dem Video auf das Canvas
            ctx.drawImage(cameraVideo, cropX, cropY, cropW, cropH, 0, 0, MAX_SIZE, MAX_SIZE);
            
            frontBase64Global = canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
            imagePreview.src = "data:image/jpeg;base64," + frontBase64Global;
            
            stopCamera();
            previewWrapper.classList.remove('hidden');
        });

        // Fallback: Wenn User ein Foto manuell hochlädt
        frontInput.addEventListener('change', async (e) => {
            if (e.target.files && e.target.files[0]) {
                frontActions.classList.add('hidden');
                frontBase64Global = await getAutoCroppedBase64FromFile(e.target.files[0]);
                imagePreview.src = "data:image/jpeg;base64," + frontBase64Global;
                previewWrapper.classList.remove('hidden');
            }
        });

        // Neu aufnehmen
        retakeBtn.addEventListener('click', () => {
            previewWrapper.classList.add('hidden');
            frontActions.classList.remove('hidden');
            frontBase64Global = null;
            frontInput.value = ""; // Input zurücksetzen
        });

        // --- KI GENERIERUNG ---
        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return alert('Bitte API Key eingeben.');
            if (!frontBase64Global) return alert('Bitte die Vorderseite fotografieren/hochladen.');
            if (!backInput.files || !backInput.files[0]) return alert('Bitte die Rückseite hochladen.');

            generateBtn.disabled = true;
            statusDiv.style.display = 'block';
            statusDiv.className = 'mt-5 p-4 text-center text-sm font-medium text-gray-700 bg-blue-50 border border-blue-100 rounded-xl';
            statusDiv.textContent = '🧠 Analysiere Rezept (Gemini 2.5 Pro)... Bitte warten...';

            try {
                const backBase64 = await getResizedBase64(backInput.files[0]);

                const prompt = `Du bist ein extrem präziser Daten-Extraktor für Rezeptkarten. Deine Aufgabe ist das fehlerfreie Abtippen, NICHT das Erfinden!

REGELN:
1. TITEL: Lies den Haupttitel und den Untertitel von der Vorderseite. Ignoriere Markenlogos oder Wörter wie "HelloFresh".
2. ZUTATEN: Lies AUSSCHLIESSLICH aus der "Zutaten"-Tabelle (Spalte 2P) und den "Basiszutaten aus Deiner Küche". 
   - Kombiniere Menge und Zutatenname logisch.
   - Wenn dort steht "1 Knoblauchzehe", schreib das. Erfinde NICHTS dazu. Lass keine Zutat weg.
3. ZUBEREITUNG:
   - Trenne jeden Arbeitsschritt zwingend mit ZWEI Zeilenumbrüchen (\\n\\n).
   - JEDES Mal, wenn eine der Zutaten im Text erwähnt wird, setze sie in Sternchen (z.B. **Öl**, **Sojasoße**).
4. ZEIT: Lies die exakte Zeitangabe (z.B. "25 - 35 Min") ab.

Gib AUSSCHLIESSLICH das fertige JSON zurück:
{
  "name": "Titel ohne Marken",
  "ingredients": "Menge Zutat 1\\nMenge Zutat 2\\n...",
  "directions": "1. **Zutat A** vorbereiten...\\n\\n2. In einer Pfanne **Öl** erhitzen...",
  "prep_time": "Zeitangabe",
  "cook_time": "",
  "servings": "2",
  "nutritional_info": "",
  "source": "HelloFresh",
  "source_url": "",
  "difficulty": ""
}`;

                const payload = {
                    contents: [{
                        parts: [
                            { text: prompt },
                            { inlineData: { mimeType: "image/jpeg", data: frontBase64Global } },
                            { inlineData: { mimeType: "image/jpeg", data: backBase64 } }
                        ]
                    }],
                    generationConfig: { responseMimeType: "application/json" }
                };

                // NUTZT DAS INTELLIGENTE PRO MODELL (Nahezu keine Halluzinationen mehr)
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();
                if (!response.ok || data.error) throw new Error(data.error?.message || "API Fehler");

                const jsonText = data.candidates[0].content.parts[0].text;
                const recipeData = JSON.parse(jsonText);
                
                recipeData.uid = generateUUID();
                recipeData.photo_data = frontBase64Global; 
                recipeData.photo = recipeData.uid + ".jpg"; 
                recipeData.categories = ["HelloFresh"];
                
                const now = new Date();
                now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
                recipeData.created = now.toISOString().replace('T', ' ').substring(0, 19);

                const jsonString = JSON.stringify(recipeData);
                const gzipped = pako.gzip(jsonString);
                
                finalFileName = (recipeData.name || "Rezept").substring(0, 30).replace(/[^a-zA-Z0-9]/g, '_') + ".paprikarecipe";
                finalRecipeFile = new File([gzipped], finalFileName, { type: "application/octet-stream" });

                generateBtn.classList.add('hidden');
                downloadBtn.classList.remove('hidden');

                statusDiv.className = 'mt-5 p-4 text-center text-sm font-bold success-bg border rounded-xl';
                statusDiv.textContent = '✅ Perfekt! Klicke auf den Button, um das Rezept herunterzuladen und in Paprika zu importieren.';
                
            } catch (error) {
                console.error(error);
                statusDiv.className = 'mt-5 p-4 text-center text-sm font-bold text-red-700 bg-red-50 border border-red-200 rounded-xl break-words';
                statusDiv.textContent = '❌ Fehler: ' + error.message;
                generateBtn.disabled = false;
            }
        });

        // Nativer Safari Download -> Erzeugt das iOS Popup "Möchtest du XY laden?" -> Öffnet sofort Paprika
        downloadBtn.addEventListener('click', () => {
            const url = URL.createObjectURL(finalRecipeFile);
            const a = document.createElement("a");
            a.href = url;
            a.download = finalFileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

    </script>
</body>
</html>
