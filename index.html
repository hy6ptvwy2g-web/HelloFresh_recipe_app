<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HelloFresh ➡️ Paprika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pako/2.1.0/pako.min.js"></script>
    <style>
        body { background-color: #f3f4f6; }
    </style>
</head>
<body class="text-gray-800 p-4 font-sans max-w-lg mx-auto">
    <h1 class="text-2xl font-bold text-center mb-6">🍋 HelloFresh ➡️ Paprika (v17)</h1>
    
    <div class="bg-white p-5 rounded-2xl shadow-sm mb-5 border border-gray-100">
        <label class="block text-sm font-bold mb-2">🔑 Google Gemini API Key</label>
        <input type="password" id="apiKey" class="w-full p-3 border rounded-xl bg-gray-50">
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm mb-5 border border-gray-100">
        <label class="block font-bold mb-2">1️⃣ Vorderseite</label>
        <input type="file" id="frontImage" accept="image/*" class="w-full">
    </div>

    <div class="bg-white p-5 rounded-2xl shadow-sm mb-6 border border-gray-100">
        <label class="block font-bold mb-2">2️⃣ Rückseite</label>
        <input type="file" id="backImage" accept="image/*" class="w-full">
    </div>

    <button id="generateBtn" class="w-full bg-green-500 text-white font-bold py-4 rounded-2xl">Rezept generieren</button>
    <button id="downloadBtn" class="hidden w-full bg-blue-500 text-white font-bold py-4 rounded-2xl mt-3">Datei laden</button>
    <div id="status" class="mt-5 p-4 text-center text-sm font-medium rounded-xl hidden"></div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        apiKeyInput.value = localStorage.getItem('geminiApiKey') || '';
        apiKeyInput.addEventListener('change', () => localStorage.setItem('geminiApiKey', apiKeyInput.value));

        const getResizedBase64 = (file) => new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (e) => {
                const img = new Image();
                img.src = e.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX = 1200;
                    let w = img.width, h = img.height;
                    if(w > MAX) { h = Math.round(h * (MAX/w)); w = MAX; }
                    canvas.width = w; canvas.height = h;
                    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                    resolve(canvas.toDataURL('image/jpeg', 0.8).split(',')[1]);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });

        generateBtn.addEventListener('click', async () => {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return alert('API Key fehlt!');
            
            generateBtn.disabled = true;
            statusDiv.classList.remove('hidden');
            statusDiv.textContent = '🧠 Analysiere mit Gemini 3.5 Flash...';

            try {
                const frontBase64 = await getResizedBase64(document.getElementById('frontImage').files[0]);
                const backBase64 = await getResizedBase64(document.getElementById('backImage').files[0]);

                const prompt = `Extrahiere Rezeptdaten strikt. 
                Titel: Ohne "HelloFresh". 
                Zutaten: Nur Spalte 2P + Kasten "Basiszutaten".
                Directions: Schritte mit \\n\\n trennen, Zutaten in **fett**.
                Nutze Gemini 3.5 Flash Logik. JSON-Format: 
                {"name":"...","ingredients":"...","directions":"...","prep_time":"...","servings":"2","source":"HelloFresh"}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{parts: [{text: prompt}, {inlineData:{mimeType:"image/jpeg", data:frontBase64}}, {inlineData:{mimeType:"image/jpeg", data:backBase64}}]}]
                    })
                });

                const data = await response.json();
                const recipeData = JSON.parse(data.candidates[0].content.parts[0].text.replace(/```json|```/g, ''));
                recipeData.photo_data = frontBase64;
                recipeData.uid = crypto.randomUUID().toUpperCase();

                const gzipped = pako.gzip(JSON.stringify(recipeData));
                const blob = new Blob([gzipped], {type: "application/octet-stream"});
                const url = URL.createObjectURL(blob);
                
                downloadBtn.classList.remove('hidden');
                downloadBtn.onclick = () => {
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = recipeData.name.replace(/[^a-z0-9]/gi, '_') + ".paprikarecipe";
                    a.click();
                };
                statusDiv.textContent = '✅ Fertig! Klicke auf "Datei laden".';
            } catch (err) {
                statusDiv.textContent = '❌ Fehler: ' + err.message;
            }
        });
    </script>
</body>
</html>
